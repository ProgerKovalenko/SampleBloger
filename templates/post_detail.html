{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">← Назад к списку статей</a></li>
            </ol>
        </nav>

        <article class="mt-4">
            <h1 class="display-4 mb-3">{{ post.title }}</h1>

            <div class="text-muted mb-4">
                <span>Автор: <strong>{{ post.author }}</strong></span> |
                <span>Опубликовано: {{ post.created_at.strftime('%d.%m.%Y %H:%M') }}</span>
            </div>

            <hr>

            <div class="lead" style="white-space: pre-wrap;">
                {{ post.content }}
            </div>
        </article>

        <div class="mt-5 border-top pt-3">
            <a href="/" class="btn btn-outline-secondary btn-sm">Вернуться на главную</a>
        </div>
    </div>
</div>
{% endblock %}
