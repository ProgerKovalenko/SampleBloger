{% extends "base.html" %}

{% block title %}Главная — Список статей{% endblock %}

{% block content %}
<h1 class="mb-4">Последние записи</h1>

<div class="row">
    {% for post in posts %}
    <div class="col-md-6 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ post.title }}</h5>
                <p class="card-text">{{ post.content | truncate(100) }}</p>
                <a href="/post/{{ post.id }}" class="btn btn-primary">Читать далее</a>
                <p class="card-text">{{ post.author }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
